name: 'Update Python Package'

on:
  workflow_call:
    inputs:
      python_version:
        default: '3.14'
        required: false
        type: string
      runs-on:
        type: string
        required: false
        default: self-hosted
    secrets:
      pipy_registry_auth:
        required: false
      checkout_token:
        required: true
      env_base64:
        required: false

# Opens an automated PR; needs write on contents + pull-requests.
permissions:
  contents: write
  pull-requests: write

jobs:
  # This workflow contains a single job called "build"
  package-update:
    # The type of runner that the job will run on
    runs-on: "${{ inputs.runs-on }}"
    timeout-minutes: 10
    env:
      env_base64: ${{ secrets.env_base64 }}
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.checkout_token }}
          persist-credentials: false
      - name: View context attributes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: console.log(context)
      - name: Setup ENV
        if: ${{ env.env_base64 != '' }}
        run: echo "$env_base64" | base64 -d > .env && source .env
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python_version }}
        if: runner.environment != 'self-hosted'
      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: runner.environment != 'self-hosted'
      - name: Pull pre-commit config
        run: |
          curl -O https://raw.githubusercontent.com/tryagainconcepts/reusable-github-workflows/main/.pre-commit-config.yaml
          curl -O https://raw.githubusercontent.com/tryagainconcepts/reusable-github-workflows/main/common.mk
      - name: install package
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          # Mask the split halves so they can't surface in logs (the combined
          # secret is masked by GitHub, but the parsed parts are not).
          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          uv venv
          uv lock --upgrade
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: format code
        run: |
          make format
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          base: main
          token: ${{ secrets.checkout_token }}
          title: '[Automated] Update Python Package'
          labels: |
            automated
            automerge
        if: always()
