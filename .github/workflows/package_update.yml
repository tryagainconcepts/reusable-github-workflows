name: 'Update Python Package'

on:
  workflow_call:
    inputs:
      python_version:
        default: '3.14'
        required: false
        type: string
      runs-on:
        type: string
        required: false
        default: self-hosted
    secrets:
      pipy_registry_auth:
        required: false
      checkout_token:
        required: true
      env_base64:
        required: false

# Opens an automated PR; needs write on contents + pull-requests.
permissions:
  contents: write
  pull-requests: write

jobs:
  # This workflow contains a single job called "build"
  package-update:
    # The type of runner that the job will run on
    runs-on: "${{ inputs.runs-on }}"
    timeout-minutes: 10
    env:
      env_base64: ${{ secrets.env_base64 }}
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.checkout_token }}
      - name: print build context
        run: |
          echo "repository = $GH_REPOSITORY"
          echo "ref        = $GH_REF"
          echo "actor      = $GH_ACTOR"
          echo "event      = $GH_EVENT_NAME"
        env:
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF: ${{ github.ref }}
          GH_ACTOR: ${{ github.actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
      - name: Setup ENV
        if: ${{ env.env_base64 != '' }}
        run: echo "$env_base64" | base64 -d > .env && source .env
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
        if: runner.environment != 'self-hosted'
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        if: runner.environment != 'self-hosted'
      - name: Pull pre-commit config
        run: |
          curl -O https://raw.githubusercontent.com/tryagainconcepts/reusable-github-workflows/main/.pre-commit-config.yaml
          curl -O https://raw.githubusercontent.com/tryagainconcepts/reusable-github-workflows/main/common.mk
      - name: install package
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          echo "Registry password length: ${#PASSWORD}"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          echo "Registry username: $UV_INDEX_PRIVATE_REGISTRY_USERNAME"
          uv venv
          uv lock --upgrade
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: format code
        run: |
          make format
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          base: main
          token: ${{ secrets.checkout_token }}
          title: '[Automated] Update Python Package'
          labels: |
            automated
            automerge
        if: always()
