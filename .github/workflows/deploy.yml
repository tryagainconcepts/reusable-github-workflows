name: "Deploy"

on:
  workflow_call:
    inputs:
      python_version:
        default: "3.14"
        required: false
        type: string
      deploy_script:
        required: false
        type: string
      aws_region:
        required: false
        default: "ap-southeast-1"
        type: string
      runs-on:
        type: string
        required: false
        default: self-hosted
      timeout-minutes:
        type: number
        required: false
        default: 10
    secrets:
      slack_webhook_url:
        description: "notify slack on github action result"
        required: false
      aws_key_id:
        required: false
      aws_secret:
        required: false
      env_base64:
        required: false
      pipy_registry_auth:
        required: false

# Deploy only reads the repo; no write scope needed.
permissions:
  contents: read

jobs:
  deploy:
    name: Pass input and secrets to my-action
    runs-on: "${{ inputs.runs-on }}"
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      env_base64: ${{ secrets.env_base64 }}
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: View context attributes
        uses: actions/github-script@v9
        with:
          script: console.log(context)
      - name: Setup ENV
        if: ${{ env.env_base64 != '' }}
        run: echo "$env_base64" | base64 -d > .env && source .env
      - name: print build context
        run: |
          echo "repository = $GH_REPOSITORY"
          echo "ref        = $GH_REF"
          echo "actor      = $GH_ACTOR"
          echo "event      = $GH_EVENT_NAME"
        env:
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF: ${{ github.ref }}
          GH_ACTOR: ${{ github.actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version-file: "pyproject.toml"
          check-latest: true
        if: runner.environment != 'self-hosted'
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        if: runner.environment != 'self-hosted'
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: |
          echo Hello, world!
          echo github ref: ${{ github.ref }}
      - name: install package
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          uv venv
          uv pip install .
          uv sync
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: deploy
        run: ${{ inputs.deploy_script }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.aws_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: Compose Slack commit summary
        if: always()
        env:
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Take the first line only, escape backslashes then double quotes,
          # strip CRs and truncate. Commit messages are attacker-controllable,
          # so this keeps them from breaking out of the JSON payload below.
          MSG="${RAW_COMMIT_MSG%%$'\n'*}"
          MSG="${MSG//\\/\\\\}"
          MSG="${MSG//\"/\\\"}"
          MSG="$(printf '%s' "$MSG" | tr -d '\r')"
          MSG="${MSG:0:160}"
          [ -z "$MSG" ] && MSG="_(no commit message)_"
          printf 'COMMIT_MSG=%s\n' "$MSG" >> "$GITHUB_ENV"
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.slack_webhook_url }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ job.status == 'success' && '✅' || job.status == 'cancelled' && '🚫' || '❌' }} Deploy ${{ job.status }} — ${{ github.repository }}@${{ github.ref_name }}"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  emoji: true
                  text: "${{ job.status == 'success' && '✅ Deploy Succeeded' || job.status == 'cancelled' && '🚫 Deploy Cancelled' || '❌ Deploy Failed' }}"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Repository*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>"
                  - type: "mrkdwn"
                    text: "*Branch*\n`${{ github.ref_name }}`"
                  - type: "mrkdwn"
                    text: "*Author*\n${{ github.actor }}"
                  - type: "mrkdwn"
                    text: "*Event*\n`${{ github.event_name }}`"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Commit*\n>${{ env.COMMIT_MSG }}"
              - type: "divider"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Workflow *${{ github.workflow }}*  ·  Run #${{ github.run_number }}  ·  `${{ github.sha }}`"
              - type: "actions"
                elements:
                  - type: "button"
                    text:
                      type: "plain_text"
                      emoji: true
                      text: "🔗 View Commit"
                    url: "${{ github.event.head_commit.url || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}"
                  - type: "button"
                    text:
                      type: "plain_text"
                      emoji: true
                      text: "📜 View Run"
                    url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
