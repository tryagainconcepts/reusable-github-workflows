name: "Deploy"

on:
  workflow_call:
    inputs:
      python_version:
        default: "3.14"
        required: false
        type: string
      deploy_script:
        required: false
        type: string
      aws_region:
        required: false
        default: "ap-southeast-1"
        type: string
      runs-on:
        type: string
        required: false
        default: self-hosted
      timeout-minutes:
        type: number
        required: false
        default: 10
    secrets:
      slack_webhook_url:
        description: "notify slack on github action result"
        required: false
      aws_key_id:
        required: false
      aws_secret:
        required: false
      env_base64:
        required: false
      pipy_registry_auth:
        required: false

jobs:
  deploy:
    name: Pass input and secrets to my-action
    runs-on: "${{ inputs.runs-on }}"
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      env_base64: ${{ secrets.env_base64 }}
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
      - name: Setup ENV
        if: ${{ env.env_base64 != '' }}
        run: echo "$env_base64" | base64 -d > .env && source .env
      - name: print github context
        run: |
          echo '${{ toJSON(github) }}'
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version-file: "pyproject.toml"
          check-latest: true
        if: runner.environment != 'self-hosted'
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        if: runner.environment != 'self-hosted'
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: |
          echo Hello, world!
          echo github ref: ${{ github.ref }}
      - name: install package
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          uv venv
          uv pip install .
          uv sync
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: deploy
        run: ${{ inputs.deploy_script }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.aws_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.slack_webhook_url }}
          webhook-type: incoming-webhook
          payload: |
            text: "Deploy ${{ job.status }}: ${{ github.repository }}@${{ github.ref_name }} by ${{ github.actor }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Deploy ${{ job.status }}*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*Workflow:* ${{ github.workflow }}\n*Event:* ${{ github.event_name }}\n<${{ github.event.head_commit.url }}|View Commit>"
        if: always()
