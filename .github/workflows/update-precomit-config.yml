name: Update pre-commit config

on:
  schedule:
    - cron: '0 5 * * 1' # Every Monday at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: View context attributes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: console.log(context)
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
      - name: Install pre-commit
        run: python -m pip install --upgrade pre-commit
      - name: Update hooks
        run: pre-commit autoupdate
      - name: Run hooks to validate the update
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: 'chore: autoupdate pre-commit config'
          title: 'chore: autoupdate pre-commit config'
          body: |
            Automated update of `.pre-commit-config.yaml` to the latest hook revisions.
          branch: chore/autoupdate-pre-commit-config
          branch-suffix: timestamp
          labels: |
            automated
            dependencies
            automerge
          add-paths: |
            .pre-commit-config.yaml
