name: Python CI Workflow

on:
  workflow_call:
    inputs:
      python_version:
        default: "3.14"
        required: false
        type: string
      test_script:
        required: false
        type: string
      deploy_script:
        required: false
        type: string
      setup_mongo:
        default: false
        required: false
        type: boolean
      setup_redis:
        default: false
        required: false
        type: boolean
      pypi_release:
        default: false
        required: false
        type: boolean
      aws_region:
        required: false
        default: "ap-southeast-1"
        type: string
      runs-on:
        type: string
        required: false
        default: self-hosted
    secrets:
      pipy_registry_auth:
        required: false
      slack_webhook_url:
        description: "notify slack on github action result"
        required: false
      aws_key_id:
        required: false
      aws_secret:
        required: false
      env_base64:
        required: false

jobs:
  build-test-deploy:
    name: Build Test and Deploy
    runs-on: "${{ inputs.runs-on }}"
    timeout-minutes: 20
    env:
      env_base64: ${{ secrets.env_base64 }}
    steps:
      - uses: supercharge/redis-github-action@1.8.1
        if: inputs.setup_redis && inputs.runs-on != 'self-hosted'
      - id: checkout
        uses: actions/checkout@v6
      - name: print github context
        run: |
          echo '${{ toJSON(steps.checkout.outputs) }}'
          echo $JSON
        env:
          JSON: ${{ toJSON(github) }}
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: ${{ inputs.python_version }}
          check-latest: true
        if: runner.environment != 'self-hosted'
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        if: runner.environment != 'self-hosted'
      - name: Pull pre-commit config
        run: |
          curl -O https://raw.githubusercontent.com/tryagainconcepts/reusable-github-workflows/main/.pre-commit-config.yaml
        if: github.ref != 'refs/heads/main'
      - name: format code
        run: make format
        if: github.ref != 'refs/heads/main'
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Automated Changes from pre-commit hooks
          file_pattern: ":!.github/"
        if: github.ref != 'refs/heads/main'
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: |
          echo Hello, world!
          echo github ref: ${{ github.ref }}
      - name: install package
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          echo "Registry username: $UV_INDEX_PRIVATE_REGISTRY_USERNAME"
          uv venv
          source .venv/bin/activate
          make config-test
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        if: inputs.setup_mongo && inputs.runs-on != 'self-hosted'
      - name: Setup ENV
        run: |
          echo "${{ env.env_base64 }}" | base64 -d > .env
          cut -d '=' -f 1 .env | sed '/^\s*$/d'
          cat .env >> "$GITHUB_ENV"
          source .env
        if: ${{ env.env_base64 != '' }}
      - name: run test
        if: inputs.test_script
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          ${{ inputs.test_script }}
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}

      - name: automerge on PR labelled with automerge
        id: automerge
        if: github.ref != 'refs/heads/main'
        uses: "pascalgn/automerge-action@v0.16.4"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_LABELS: "automerge,!work in progress"
      - name: switch to main branch
        if: steps.automerge.outputs.mergeResult == 'merged'
        uses: actions/checkout@v6
        with:
          ref: main
      - name: deploy
        if: inputs.deploy_script && (endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged')
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          echo "Registry username: $UV_INDEX_PRIVATE_REGISTRY_USERNAME"
          ${{ inputs.deploy_script }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.aws_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: bumpversion
        if: endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged'
        run: |
          git config --global user.email "bumpversion@example.com"
          git config --global user.name "versionbump"
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          echo "Registry username: $UV_INDEX_PRIVATE_REGISTRY_USERNAME"
          uv version --bump minor
          git add pyproject.toml uv.lock
          git commit -m "Bump version to $(uv version --short)"
          git tag -a "$(uv version --short)" -m "Release $(uv version --short)"
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: Push new version tag
        if: endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged'
        uses: ad-m/github-push-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force: true
      - name: Release pypi on main branch
        if: inputs.pypi_release && (endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged')
        run: |
          make release-s3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.aws_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.slack_webhook_url }}
          webhook-type: incoming-webhook
          payload: |
            text: "Deploy ${{ job.status }}: ${{ github.repository }}@${{ github.ref_name }} by ${{ github.actor }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Deploy ${{ job.status }}*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.event.head_commit.message }}\n*Author:* ${{ github.actor }}\n*Workflow:* ${{ github.workflow }}\n*Event:* ${{ github.event_name }}\n<${{ github.event.head_commit.url }}|View Commit>"
        if: always()
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: endsWith(github.ref, '/main')
    needs: build-test-deploy
    steps:
      - uses: actions/checkout@v6
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update CHANGELOG.md
        env:
          CHANGELOG_CONTENT: ${{ steps.build_changelog.outputs.changelog }}
        run: |
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md CHANGELOG.previous.md
          fi

          {
            printf '## %s\n\n' "$(date -u +'%Y-%m-%d')"
            printf '%s\n\n' "$CHANGELOG_CONTENT"
            if [ -f CHANGELOG.previous.md ]; then
              cat CHANGELOG.previous.md
            fi
          } > CHANGELOG.md

          rm -f CHANGELOG.previous.md
      - name: Commit Changelog
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update changelog"
          file_pattern: CHANGELOG.md
