name: Python CI Workflow

on:
  workflow_call:
    inputs:
      python_version:
        default: "3.14"
        required: false
        type: string
      test_script:
        required: false
        type: string
      deploy_script:
        required: false
        type: string
      setup_mongo:
        default: false
        required: false
        type: boolean
      pypi_release:
        default: false
        required: false
        type: boolean
      aws_region:
        required: false
        default: "ap-southeast-1"
        type: string
      runs-on:
        type: string
        required: false
        default: self-hosted
    secrets:
      pipy_registry_auth:
        required: false
      slack_webhook_url:
        description: "notify slack on github action result"
        required: false
      aws_key_id:
        required: false
      aws_secret:
        required: false
      env_base64:
        required: false

# Least-privilege token: only what the jobs below actually need
# (automerge + tag/changelog commits need write; everything else read).
permissions:
  contents: write
  pull-requests: write

jobs:
  build-test-deploy:
    name: Build Test and Deploy
    runs-on: "${{ inputs.runs-on }}"
    timeout-minutes: 20
    env:
      env_base64: ${{ secrets.env_base64 }}
    steps:
      - id: checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: print build context
        run: |
          echo "repository = $GH_REPOSITORY"
          echo "ref        = $GH_REF"
          echo "actor      = $GH_ACTOR"
          echo "event      = $GH_EVENT_NAME"
          echo "sha        = $GH_SHA"
        env:
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF: ${{ github.ref }}
          GH_ACTOR: ${{ github.actor }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_SHA: ${{ github.sha }}
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: ${{ inputs.python_version }}
          check-latest: true
        if: runner.environment != 'self-hosted'
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        if: runner.environment != 'self-hosted'
      - name: Pull pre-commit config
        run: |
          curl -O https://raw.githubusercontent.com/tryagainconcepts/reusable-github-workflows/main/.pre-commit-config.yaml
        if: github.ref != 'refs/heads/main'
      - name: Run a one-line script
        run: |
          echo Hello, world!
          echo github ref: ${{ github.ref }}
      - name: install package
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          uv venv
          source .venv/bin/activate
          make config-test
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        if: inputs.setup_mongo && inputs.runs-on != 'self-hosted'
      - name: Setup ENV
        run: |
          echo "$env_base64" | base64 -d > .env
          cut -d '=' -f 1 .env | sed '/^\s*$/d'
          cat .env >> "$GITHUB_ENV"
          source .env
        if: ${{ env.env_base64 != '' }}
      - name: run test
        if: inputs.test_script
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          ${{ inputs.test_script }}
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}

      - name: automerge on PR labelled with automerge
        id: automerge
        if: github.ref != 'refs/heads/main'
        run: gh pr merge --merge --auto "1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: switch to main branch
        if: steps.automerge.outputs.mergeResult == 'merged'
        uses: actions/checkout@v7
        with:
          ref: main
          persist-credentials: false
      - name: Debug deploy conditions
        if: always()
        run: |
          echo "github.ref                 = ${{ github.ref }}"
          echo "endsWith(ref, '/main')     = ${{ endsWith(github.ref, '/main') }}"
          echo "automerge mergeResult       = ${{ steps.automerge.outputs.mergeResult }}"
          echo "inputs.deploy_script set?   = ${{ inputs.deploy_script != '' }}"
          echo "inputs.pypi_release         = ${{ inputs.pypi_release }}"
          echo "deploy step will run?       = ${{ inputs.deploy_script != '' && (endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged') }}"
      - name: deploy
        if: inputs.deploy_script && (endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged')
        run: |
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          echo "Registry username: $UV_INDEX_PRIVATE_REGISTRY_USERNAME"
          ${{ inputs.deploy_script }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.aws_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: bumpversion
        if: endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged'
        run: |
          git config --global user.email "bumpversion@example.com"
          git config --global user.name "versionbump"
          IFS=":" read -r USERNAME PASSWORD <<< "$REGISTRY_AUTH"
          export UV_INDEX_PRIVATE_REGISTRY_USERNAME="$USERNAME"
          export UV_INDEX_PRIVATE_REGISTRY_PASSWORD="$PASSWORD"
          uv version --bump minor
          git add pyproject.toml uv.lock
          git commit -m "Bump version to $(uv version --short)"
          git tag -a "$(uv version --short)" -m "Release $(uv version --short)"
        env:
          REGISTRY_AUTH: ${{ secrets.pipy_registry_auth }}
      - name: Push new version tag
        if: endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged'
        uses: ad-m/github-push-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tags: true
      - name: Release pypi on main branch
        if: inputs.pypi_release && (endsWith(github.ref, '/main') || steps.automerge.outputs.mergeResult == 'merged')
        run: |
          make release-s3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.aws_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
      - name: Compose Slack commit summary
        if: always()
        env:
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Take the first line only, escape backslashes then double quotes,
          # strip CRs and truncate. Commit messages are attacker-controllable,
          # so this keeps them from breaking out of the JSON payload below.
          MSG="${RAW_COMMIT_MSG%%$'\n'*}"
          MSG="${MSG//\\/\\\\}"
          MSG="${MSG//\"/\\\"}"
          MSG="$(printf '%s' "$MSG" | tr -d '\r')"
          MSG="${MSG:0:160}"
          [ -z "$MSG" ] && MSG="_(no commit message)_"
          printf 'COMMIT_MSG=%s\n' "$MSG" >> "$GITHUB_ENV"
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.slack_webhook_url }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ job.status == 'success' && '✅' || job.status == 'cancelled' && '🚫' || '❌' }} Deploy ${{ job.status }} — ${{ github.repository }}@${{ github.ref_name }}"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  emoji: true
                  text: "${{ job.status == 'success' && '✅ Deploy Succeeded' || job.status == 'cancelled' && '🚫 Deploy Cancelled' || '❌ Deploy Failed' }}"
              - type: "section"
                fields:
                  - type: "mrkdwn"
                    text: "*Repository*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>"
                  - type: "mrkdwn"
                    text: "*Branch*\n`${{ github.ref_name }}`"
                  - type: "mrkdwn"
                    text: "*Author*\n${{ github.actor }}"
                  - type: "mrkdwn"
                    text: "*Event*\n`${{ github.event_name }}`"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Commit*\n>${{ env.COMMIT_MSG }}"
              - type: "divider"
              - type: "context"
                elements:
                  - type: "mrkdwn"
                    text: "Workflow *${{ github.workflow }}*  ·  Run #${{ github.run_number }}  ·  `${{ github.sha }}`"
              - type: "actions"
                elements:
                  - type: "button"
                    text:
                      type: "plain_text"
                      emoji: true
                      text: "🔗 View Commit"
                    url: "${{ github.event.head_commit.url || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}"
                  - type: "button"
                    text:
                      type: "plain_text"
                      emoji: true
                      text: "📜 View Run"
                    url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: endsWith(github.ref, '/main')
    needs: build-test-deploy
    steps:
      # Check out the tip of main (includes the version-bump commit the
      # build-test-deploy job just pushed) so the changelog commit is a
      # fast-forward and not a divergent push. fetch-depth: 0 gives the
      # changelog builder full tag history.
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update CHANGELOG.md
        env:
          CHANGELOG_CONTENT: ${{ steps.build_changelog.outputs.changelog }}
        run: |
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md CHANGELOG.previous.md
          fi

          {
            printf '## %s\n\n' "$(date -u +'%Y-%m-%d')"
            printf '%s\n\n' "$CHANGELOG_CONTENT"
            if [ -f CHANGELOG.previous.md ]; then
              cat CHANGELOG.previous.md
            fi
          } > CHANGELOG.md

          rm -f CHANGELOG.previous.md
      - name: Commit Changelog
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update changelog [skip ci]"
          file_pattern: CHANGELOG.md
